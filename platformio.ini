; PlatformIO Project Configuration File
;
; Matrix Clock with animation - Adafruit MatrixPortal M4 (SAMD51 + WiFiNINA)
;
; Build:    pio run
; Upload:   pio run -t upload     (put the board into the UF2 bootloader via double reset)
; Monitor:  pio device monitor
;
; Docs: https://docs.platformio.org/page/projectconf.html

[env:adafruit_matrix_portal_m4]
platform  = atmelsam
board     = adafruit_matrix_portal_m4
framework = arduino

; Serial console (matches Serial.begin(115200) in the code)
monitor_speed = 115200

; Upload goes through the SAM-BA / UF2 bootloader.
; Note: before uploading, press the RESET button twice quickly so the board
; shows up as a bootloader drive. PlatformIO then finds the port by itself.
; Pin the port explicitly if needed:
; upload_port = COMx

; --- Library dependencies -----------------------------------------------------
; WiFiNINA 2.0.x pairs with the new nina-fw firmware line (2.0.0+/3.x, via the
; Arduino_SpiNINA driver). The board now runs nina-fw 3.3.0, so 2.0.x is the
; matching library. (1.9.1 was a stopgap while the board still had old 1.7.4 fw.)
lib_deps =
    adafruit/Adafruit Protomatter @ ^1.7.1   ; RGB matrix driver (SAMD51 DMA)
    adafruit/Adafruit GFX Library @ ^1.12.6   ; graphics/font base (fonts, color565)
    arduino-libraries/WiFiNINA @ ^2.0.1       ; WiFi (station + AP) and NTP; pairs with nina-fw 3.x
    paulstoffregen/Time @ ^1.6.1              ; TimeLib (now(), hour(), setTime(), adjustTime())
    khoih-prog/FlashStorage_SAMD @ ^1.3.2     ; persistent settings in flash
    adafruit/Adafruit LIS3DH @ ^1.3.0         ; onboard accelerometer (orientation detection)
    adafruit/Adafruit Unified Sensor @ ^1.1.14 ; sensor base class for LIS3DH (BusIO pulled transitively)
    claws/BH1750 @ ^1.3.0                     ; external I2C ambient light sensor (auto-brightness)
